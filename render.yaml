services:
  - type: web
    name: plus-control
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python back/app.py"
    disk:
      name: plus-control-data
      mountPath: /opt/render/project/src/back/data
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: back/app.py
      - key: APP_TZ
        value: America/Panama
      - key: ALLOW_DEV_EMAIL_FALLBACK
        value: "0"
      - key: GMAIL_USER
        value: "REPLACE_WITH_GMAIL_USER"
      - key: GMAIL_APP_PASSWORD
        value: "REPLACE_WITH_GMAIL_APP_PASSWORD"
      - key: SMTP_FROM
        value: "REPLACE_WITH_SMTP_FROM"
